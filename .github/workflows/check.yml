name: Hourly SAS award check

on:
  schedule:
    # Off the congested minute-0 slot: GHA delays/drops :00 crons the most,
    # and it's the most bot-stampeded minute from datacenter IPs.
    - cron: '37 * * * *'
  workflow_dispatch: {}

concurrency:
  group: sas-check
  cancel-in-progress: false

# Cloudflare blocks are probabilistic per-IP; each attempt job gets a fresh
# runner VM (fresh IP). Later attempts only run when the earlier ones were
# blocked, and the run only goes red when every attempt failed.
jobs:
  attempt-1:
    uses: ./.github/workflows/check-run.yml
    with:
      attempt: '1'
    secrets: inherit

  attempt-2:
    needs: attempt-1
    if: needs.attempt-1.outputs.ok != 'true'
    uses: ./.github/workflows/check-run.yml
    with:
      attempt: '2'
    secrets: inherit

  attempt-3:
    needs: [attempt-1, attempt-2]
    if: always() && needs.attempt-1.outputs.ok != 'true' && needs.attempt-2.outputs.ok != 'true'
    uses: ./.github/workflows/check-run.yml
    with:
      attempt: '3'
    secrets: inherit

  status:
    needs: [attempt-1, attempt-2, attempt-3]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Skipped attempts have empty outputs, which counts as "not ok" — but a
      # skipped attempt-2/3 implies an earlier attempt succeeded, so the
      # condition is only true when every attempt actually ran and failed.
      - name: Fail when every attempt was blocked
        if: needs.attempt-1.outputs.ok != 'true' && needs.attempt-2.outputs.ok != 'true' && needs.attempt-3.outputs.ok != 'true'
        run: |
          echo 'All attempts were blocked.'
          exit 1
